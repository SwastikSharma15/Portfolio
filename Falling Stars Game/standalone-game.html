<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Stars Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 600px;
            height: 600px;
            position: relative;
            border: 3px solid #fff;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
        }

        .game-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        .name-input {
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            width: 250px;
        }

        .device-selection {
            text-align: center;
            margin-bottom: 20px;
        }

        .device-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .device-btn {
            padding: 15px 25px;
            border: 2px solid #666;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            min-width: 120px;
            text-align: center;
        }

        .device-btn:hover {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.05);
        }

        .device-btn.selected {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .instructions {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            max-width: 400px;
        }

        .start-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: none;
            justify-content: space-between;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 10;
            color: white;
        }

        .timer {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            font-weight: bold;
            z-index: 10;
            color: white;
            display: none;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            text-align: center;
        }

        .play-again-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .play-again-btn:hover {
            transform: scale(1.05);
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 20;
        }

        .mobile-controls.show {
            display: flex;
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #FFD700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            transition: all 0.1s ease;
        }

        .mobile-btn:active {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(0.95);
        }

        .mobile-btn::before {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
        }

        .mobile-btn.left::before {
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 20px solid #FFD700;
        }

        .mobile-btn.right::before {
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 20px solid #FFD700;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <h1 class="game-title">⭐ Catch the Falling Stars ⭐</h1>
            <input type="text" class="name-input" id="playerName" placeholder="Enter your name" maxlength="20">
            
            <div class="device-selection">
                <h3>Choose Your Control Method:</h3>
                <div class="device-options">
                    <button class="device-btn" id="desktopBtn">
                        ⌨️ Keyboard<br>
                        <small>(A/D or Arrow Keys)</small>
                    </button>
                    <button class="device-btn" id="mobileBtn">
                        📱 Touch<br>
                        <small>(On-screen Buttons)</small>
                    </button>
                </div>
            </div>
            
            <div class="instructions">
                <p><strong>How to Play:</strong></p>
                <p id="controlInstructions">Choose your control method above</p>
                <p>Catch as many falling stars as you can in 45 seconds!</p>
            </div>
            <button class="start-btn" id="startBtn" disabled>Let's Go!</button>
        </div>

        <!-- Game HUD -->
        <div class="hud" id="gameHud">
            <div>Score: <span id="currentScore">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>

        <div class="timer" id="gameTimer">45</div>

        <!-- Game Canvas -->
        <canvas class="game-canvas" id="gameCanvas" width="600" height="600"></canvas>

        <!-- Mobile Controls -->
        <div class="mobile-controls" id="mobileControls">
            <div class="mobile-btn left" id="leftBtn"></div>
            <div class="mobile-btn right" id="rightBtn"></div>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over" id="gameOverScreen">
            <h2>Game Over!</h2>
            <div id="finalScore">Final Score: 0</div>
            <div id="playerGreeting"></div>
            <button class="play-again-btn" id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script>
        // Game state
        let gameState = {
            isPlaying: false,
            score: 0,
            timeLeft: 45,
            playerName: '',
            deviceType: '',
            basket: { x: 260, y: 550, width: 80, height: 20 },
            stars: [],
            keys: {},
            starSpeed: 2,
            spawnRate: 0.03,
            timerInterval: null,
            gameLoop: null
        };

        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameHud = document.getElementById('gameHud');
        const gameTimer = document.getElementById('gameTimer');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const playerNameInput = document.getElementById('playerName');
        const startBtn = document.getElementById('startBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const desktopBtn = document.getElementById('desktopBtn');
        const mobileBtn = document.getElementById('mobileBtn');
        const controlInstructions = document.getElementById('controlInstructions');
        const currentScore = document.getElementById('currentScore');
        const highScore = document.getElementById('highScore');
        const finalScore = document.getElementById('finalScore');
        const playerGreeting = document.getElementById('playerGreeting');
        const mobileControls = document.getElementById('mobileControls');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Initialize canvas
        canvas.width = 600;
        canvas.height = 600;
        gameState.basket.y = canvas.height - 50;

        // Create star
        function createStar() {
            return {
                x: Math.random() * (canvas.width - 30),
                y: -30,
                size: 15,
                speed: gameState.starSpeed + Math.random() * 2,
                rotation: 0
            };
        }

        // Draw star
        function drawStar(x, y, size, rotation) {
            ctx.save();
            ctx.translate(x + size, y + size);
            ctx.rotate(rotation);
            ctx.fillStyle = '#FFD700';
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 144 - 90) * Math.PI / 180;
                const x1 = Math.cos(angle) * size;
                const y1 = Math.sin(angle) * size;
                
                if (i === 0) ctx.moveTo(x1, y1);
                else ctx.lineTo(x1, y1);
                
                const innerAngle = ((i * 144) + 72 - 90) * Math.PI / 180;
                const x2 = Math.cos(innerAngle) * (size * 0.4);
                const y2 = Math.sin(innerAngle) * (size * 0.4);
                ctx.lineTo(x2, y2);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        // Draw basket
        function drawBasket() {
            const { x, y, width, height } = gameState.basket;
            
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x, y, width, height);
            
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(x - 5, y - 5, width + 10, 8);
        }

        // Check collision
        function checkCollision(star) {
            const { x, y, width, height } = gameState.basket;
            return (
                star.x + star.size * 2 > x &&
                star.x < x + width &&
                star.y + star.size * 2 > y &&
                star.y < y + height
            );
        }

        // Update game
        function updateGame() {
            const moveSpeed = 8;
            
            // Move basket based on device type
            if (gameState.deviceType === 'desktop') {
                // Keyboard controls
                if ((gameState.keys['ArrowLeft'] || gameState.keys['KeyA']) && gameState.basket.x > 0) {
                    gameState.basket.x -= moveSpeed;
                }
                if ((gameState.keys['ArrowRight'] || gameState.keys['KeyD']) && gameState.basket.x < canvas.width - gameState.basket.width) {
                    gameState.basket.x += moveSpeed;
                }
            } else {
                // Mobile touch controls
                if (gameState.keys['mobile-left'] && gameState.basket.x > 0) {
                    gameState.basket.x -= moveSpeed;
                }
                if (gameState.keys['mobile-right'] && gameState.basket.x < canvas.width - gameState.basket.width) {
                    gameState.basket.x += moveSpeed;
                }
            }

            // Spawn stars
            if (Math.random() < gameState.spawnRate) {
                gameState.stars.push(createStar());
            }

            // Update stars
            for (let i = gameState.stars.length - 1; i >= 0; i--) {
                const star = gameState.stars[i];
                star.y += star.speed;
                star.rotation += 0.1;

                if (checkCollision(star)) {
                    gameState.score++;
                    currentScore.textContent = gameState.score;
                    gameState.stars.splice(i, 1);
                } else if (star.y > canvas.height) {
                    gameState.stars.splice(i, 1);
                }
            }
        }

        // Render game
        function renderGame() {
            // Clear canvas
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(30, 60, 114, 0.3)');
            gradient.addColorStop(1, 'rgba(42, 82, 152, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars
            gameState.stars.forEach(star => {
                drawStar(star.x, star.y, star.size, star.rotation);
            });

            // Draw basket
            drawBasket();
        }

        // Game loop
        function gameLoop() {
            if (!gameState.isPlaying) return;
            
            updateGame();
            renderGame();
            gameState.gameLoop = requestAnimationFrame(gameLoop);
        }

        // Device selection
        function selectDevice(deviceType) {
            gameState.deviceType = deviceType;
            
            desktopBtn.classList.remove('selected');
            mobileBtn.classList.remove('selected');
            
            if (deviceType === 'desktop') {
                desktopBtn.classList.add('selected');
                controlInstructions.innerHTML = 'Use <strong>A & D</strong> keys or <strong>← & →</strong> arrow keys to move your basket';
            } else {
                mobileBtn.classList.add('selected');
                controlInstructions.innerHTML = 'Use the <strong>on-screen buttons</strong> to move your basket left and right';
            }
            
            startBtn.disabled = false;
        }

        // Start game
        function startGame() {
            if (!gameState.deviceType) return;
            
            gameState.playerName = playerNameInput.value.trim() || 'Player';
            gameState.isPlaying = true;
            gameState.score = 0;
            gameState.timeLeft = 45;
            gameState.stars = [];
            gameState.basket.x = (canvas.width - gameState.basket.width) / 2;
            gameState.keys = {};
            
            startScreen.style.display = 'none';
            gameHud.style.display = 'flex';
            gameTimer.style.display = 'block';
            canvas.style.display = 'block';
            
            // Show mobile controls if mobile device selected
            if (gameState.deviceType === 'mobile') {
                mobileControls.classList.add('show');
            }
            
            currentScore.textContent = '0';
            gameTimer.textContent = '45';
            
            // Start timer
            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                gameTimer.textContent = gameState.timeLeft;
                
                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            gameLoop();
        }

        // End game
        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timerInterval);
            cancelAnimationFrame(gameState.gameLoop);
            
            // Hide mobile controls
            mobileControls.classList.remove('show');
            gameState.keys = {};
            
            finalScore.textContent = `Final Score: ${gameState.score}`;
            playerGreeting.textContent = `Great job, ${gameState.playerName}!`;
            gameOverScreen.style.display = 'flex';
        }

        // Reset game
        function resetGame() {
            gameState.keys = {};
            mobileControls.classList.remove('show');
            
            gameOverScreen.style.display = 'none';
            gameHud.style.display = 'none';
            gameTimer.style.display = 'none';
            canvas.style.display = 'none';
            startScreen.style.display = 'flex';
            playerNameInput.focus();
        }

        // Event listeners
        desktopBtn.addEventListener('click', () => selectDevice('desktop'));
        mobileBtn.addEventListener('click', () => selectDevice('mobile'));
        startBtn.addEventListener('click', startGame);
        playAgainBtn.addEventListener('click', resetGame);

        // Mobile button controls
        leftBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState.isPlaying) {
                gameState.keys['mobile-left'] = true;
            }
        });

        leftBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            gameState.keys['mobile-left'] = false;
        });

        rightBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState.isPlaying) {
                gameState.keys['mobile-right'] = true;
            }
        });

        rightBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            gameState.keys['mobile-right'] = false;
        });

        // Also support mouse events for mobile buttons (for testing on desktop)
        leftBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameState.isPlaying && gameState.deviceType === 'mobile') {
                gameState.keys['mobile-left'] = true;
            }
        });

        leftBtn.addEventListener('mouseup', (e) => {
            e.preventDefault();
            gameState.keys['mobile-left'] = false;
        });

        rightBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameState.isPlaying && gameState.deviceType === 'mobile') {
                gameState.keys['mobile-right'] = true;
            }
        });

        rightBtn.addEventListener('mouseup', (e) => {
            e.preventDefault();
            gameState.keys['mobile-right'] = false;
        });

        // Prevent context menu on mobile buttons
        leftBtn.addEventListener('contextmenu', (e) => e.preventDefault());
        rightBtn.addEventListener('contextmenu', (e) => e.preventDefault());

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (gameState.isPlaying) {
                gameState.keys[e.code] = true;
                if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD'].includes(e.code)) {
                    e.preventDefault();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            gameState.keys[e.code] = false;
        });

        // Initialize
        highScore.textContent = '0';
        console.log('Standalone game loaded');
    </script>
</body>
</html>
